<div class="toolbar">

    <button>
        Select
    </button>

    <input
        #fileInput
        type="file"
        accept=".json"
        hidden
        (change)="onFileSelected($event)">

        <input
    #scenarioInput
    type="file"
    accept=".json"
    hidden
    (change)="loadScenario($event)">
    <button (click)="fileInput.click()">
        Upload JSON
    </button>

    <button (click)="removeJson()">
        Remove JSON
    </button>

    <span class="spacer"></span>

    <button>
        Filters ▼
    </button>

    <button>
        🔵 Blue
    </button>

    <button>
        🔴 Red
    </button>

    <button (click)="saveScenario()">
    Save Scenario
</button>
    <button (click)="clearScenario()">
    Clear
</button>

    <button (click)="scenarioInput.click()">
    Load Scenario
</button>

   <button (click)="showSplit()">
    Split
</button>

<button (click)="show2D()">
    Full 2D
</button>

<button (click)="show3D()">
    Full 3D
</button>

</div>
