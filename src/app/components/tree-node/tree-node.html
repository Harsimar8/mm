<div class="tree-node">

  <div class="node-label">

    <!-- Dropdown arrow -->
    <span
      class="toggle"
      *ngIf="node.children && node.children.length > 0"
      (click)="toggle()">

      {{ node.expanded ? "▼" : "▶" }}

    </span>

    <!-- Folder/Asset name -->
    <span (click)="handleClick()">
      {{ node.name }}
    </span>

  </div>

  <!-- Children -->
  <div class="children" *ngIf="node.expanded">

  <app-tree-node
    *ngFor="let child of node.children"
    [node]="child"
    (assetSelected)="onAssetSelected($event)">
  </app-tree-node>

</div>

</div>
